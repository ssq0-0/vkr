global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  - job_name: 'processor-cpp'
    metrics_path: /metrics
    static_configs:
      - targets: ['processor-cpp:9091']
        labels:
          impl: cpp
          modes: arena_no_arena
